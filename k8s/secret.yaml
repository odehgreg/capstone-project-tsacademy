apiVersion: v1
kind: Secret
metadata:
  name: taskapp-secret
  namespace: taskapp
type: Opaque
stringData:
  DATABASE_URL: "postgresql://taskapp_user:taskapp_password@postgres.taskapp.svc.cluster.local:5432/taskapp"
  JWT_SECRET: "change-this-to-a-strong-secret"
  POSTGRES_DB: "taskapp"
  POSTGRES_USER: "taskapp_user"
  POSTGRES_PASSWORD: "taskapp_password"
